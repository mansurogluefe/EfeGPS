<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mansur_AI | Uzmanlar Konseyi</title>
    <!-- Markdown ve XSS Güvenlik Kütüphaneleri -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --chat-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --user-msg-bg: #2563eb;
            --bot-msg-bg: #3f3f3f;
            --accent-color: #3b82f6;
            --border-color: #444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        header {
            background-color: var(--chat-bg);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--accent-color);
            margin-bottom: 4px;
        }

        .status {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #10b981;
            border-radius: 50%;
            margin-right: 8px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background-color 0.2s;
        }

        .icon-btn:hover {
            background-color: #444;
        }

        /* Chat Area */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            border-bottom-left-radius: 4px;
            border: 1px solid #444;
        }

        /* Bot Mesaj İçi Markdown Stilleri */
        .msg-content p {
            margin: 0 0 8px 0;
        }

        .msg-content p:last-child {
            margin-bottom: 0;
        }

        .msg-content pre {
            background-color: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid #333;
            margin: 8px 0;
        }

        .msg-content code {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1a1a1a;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .msg-content a {
            color: #60a5fa;
        }

        .source-tag {
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 6px;
            display: inline-block;
            font-size: 0.8rem;
            background: rgba(59, 130, 246, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Animasyon */
        .typing-indicator {
            font-style: italic;
            color: #888;
            font-size: 0.85rem;
            margin-left: 10px;
            display: flex;
            align-items: center;
        }

        .typing-dots::after {
            content: '';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '';
            }

            40% {
                content: '.';
            }

            60% {
                content: '..';
            }

            80%,
            100% {
                content: '...';
            }
        }

        /* Input Area */
        #input-area {
            background-color: var(--chat-bg);
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        #user-input {
            flex: 1;
            background-color: #1a1a1a;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            resize: none;
            /* Manuel boyutu kapat, JS halledecek */
            min-height: 24px;
            max-height: 150px;
            font-family: inherit;
            line-height: 1.4;
        }

        #user-input:focus {
            border-color: var(--accent-color);
        }

        #send-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            height: 48px;
            /* Input'un standart yüksekliğiyle hizalı */
        }

        #send-btn:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        #send-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

<body>

    <header>
        <div>
            <h1>Mansur_AI | Uzmanlar Konseyi</h1>
            <div class="status">
                <div class="status-dot"></div>
                Sistem Aktif (Tailscale Üzerinden)
            </div>
        </div>
        <div class="action-buttons">
            <button id="clear-btn" class="icon-btn">Sohbeti Temizle</button>
        </div>
    </header>

    <div id="chat-container">
        <div class="message bot-message">
            <span class="source-tag">[Sistem]</span>
            <div class="msg-content">Merhaba Efe, Mansur_AI sistemi aktif. Hangi konuda araştırma veya teknik analiz
                yapmamı istersin?</div>
        </div>
    </div>

    <div id="input-area">
        <textarea id="user-input" rows="1"
            placeholder="Mesajınızı yazın... (Satır atlamak için Shift+Enter)"></textarea>
        <button id="send-btn">Gönder</button>
    </div>

    <script>
        // --- KRİTİK AYARLAR ---
        // Tailscale IP adresini veya yerel IP'yi buraya yaz (Başına https:// veya http:// koymadan)
        const LOCAL_IP = "https://laptop-vu63um9k.taile4483b.ts.net";

        // Dify API Anahtarını buraya yapıştır (Dify -> API Erişimi -> Yeni Anahtar)
        const API_KEY = "app-oe0Pbp2x2YJHTVHYKfHldBv1";
        // -----------------------

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');

        let isTyping = false;

        // XSS Önlemi: Düz metinleri güvenilir hale getirir
        function escapeHTML(str) {
            if (!str) return str;
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Mesaj Ekleme Fonksiyonu
        function addMessage(text, sender, source = null) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');

            let messageHTML = '';
            if (source) {
                messageHTML += `<span class="source-tag">${escapeHTML(source)}</span>`;
            }

            if (sender === 'bot') {
                // Bot yanıtını Markdown olarak çevirip DomPurify ile zararlı kodlardan arındır
                const htmlContent = marked.parse(text);
                const pureHTML = DOMPurify.sanitize(htmlContent);
                messageHTML += `<div class="msg-content">${pureHTML}</div>`;
            } else {
                // Kullanıcı yanıtı sadece text olarak ve satır atlamaları korunarak basılır
                messageHTML += `<div class="msg-content" style="white-space: pre-wrap;">${escapeHTML(text)}</div>`;
            }

            messageDiv.innerHTML = messageHTML;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Yükleniyor Göstergesi
        function toggleTyping() {
            if (!isTyping) {
                const typingDiv = document.createElement('div');
                typingDiv.id = 'typing-indicator';
                typingDiv.classList.add('typing-indicator');
                typingDiv.innerHTML = `Konsey düşünüyor<span class="typing-dots"></span>`;
                chatContainer.appendChild(typingDiv);
                isTyping = true;
            } else {
                const typingDiv = document.getElementById('typing-indicator');
                if (typingDiv) typingDiv.remove();
                isTyping = false;
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // --- DIFY API BAĞLANTISI ---
        async function sendMessageToDify(message) {
            toggleTyping();
            sendBtn.disabled = true;

            // Dify Chatbot (Sohbet Akışı) API Uç Noktası
            // Kullanıcı IP başına https koysa bile hatayı engellemek için temizliyoruz:
            let baseIP = LOCAL_IP.replace(/^https?:\/\//, '').replace(/\/$/, '');
            const url = `https://${baseIP}/v1/chat-messages`;

            const payload = {
                "inputs": {}, // Chatbot modunda genel ekstra değişkenler buraya yazılır
                "query": message, // Asıl soru doğrudan query köküne yazılır
                "response_mode": "blocking",
                "user": "Efe_Admin"
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    let errorDetail = `Hata Kodu: ${response.status}`;
                    try {
                        const errorData = await response.json();
                        errorDetail = errorData.message || errorData.code || JSON.stringify(errorData);
                    } catch (e) {
                        try {
                            errorDetail = await response.text();
                        } catch (err) { }
                    }
                    throw new Error(`Dify Sunucu Reddi: ${errorDetail}`);
                }

                const data = await response.json();

                // Dify Sohbet/Chatflow modunda gelen cevap doğrudan "answer" içinde yer alır
                let botResponse = data.answer || "⚠️ API bağlantısı sağlandı ancak bot tarafından boş (null) bir cevap döndü.";

                // Dify 'Sentez' kaynaklarını ayıklamak 
                let source = "[Kaynak: Sentez]";
                let cleanText = botResponse;

                // Cevapta köşeli parantezli bir kaynak formatı (Örn: [Kaynak: Web]) geçiyorsa bul ve ayır
                const sourceMatch = typeof botResponse === 'string' ? botResponse.match(/^\[Kaynak:\s*([^\]]+)\]/i) : null;
                if (sourceMatch) {
                    source = `[Kaynak: ${sourceMatch[1]}]`;
                    cleanText = botResponse.replace(sourceMatch[0], '').trim();
                }

                addMessage(cleanText, 'bot', source);

            } catch (error) {
                console.error("Fetch Hatası:", error);
                const errText = "Sistem hatası: Sunucuya ulaşılamadı. Tailscale VPN bağlantısının açık olduğundan ve Dify API keyinin doğruluğundan emin ol. Detay: " + error.message;
                addMessage(errText, 'bot', '[Hata]');
            } finally {
                toggleTyping();
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function handleSend() {
            const message = userInput.value.trim();
            if (message && !isTyping) {
                addMessage(message, 'user');
                userInput.value = '';
                userInput.style.height = 'auto'; // Gönderince yüksekliği sıfırla
                sendMessageToDify(message);
            }
        }

        // Event Listeners
        sendBtn.addEventListener('click', handleSend);

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // Textarea otomatik genişletme
        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        clearBtn.addEventListener('click', () => {
            if (confirm("Tüm sohbet geçmişi silinsin mi?")) {
                chatContainer.innerHTML = '';
                addMessage('Sohbet temizlendi. Yeni bir soru sorabilirsin.', 'bot', '[Sistem]');
            }
        });

    </script>
</body>

</html>
